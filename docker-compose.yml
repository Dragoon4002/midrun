services:
  proof-server:
    image: midnightntwrk/proof-server:latest
    ports:
      - "6300:6300"
    restart: unless-stopped

  ws:
    build: ./ws
    ports:
      - "3001:3001"
    env_file:
      - ./ws/.env
    environment:
      MIDNIGHT_PROOF_SERVER_URL: http://proof-server:6300
    depends_on:
      - proof-server
    restart: unless-stopped
